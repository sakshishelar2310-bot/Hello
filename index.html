<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hello Batch</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #141e30, #243b55);
      overflow:hidden;
    }

    .container{
      text-align:center;
      padding:40px;
      width:90%;
      max-width:700px;
      border-radius:25px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      animation: floatBox 3s ease-in-out infinite;
    }

    h1{
      font-size:4rem;
      color:#fff;
      margin-bottom:20px;
      letter-spacing:3px;
      text-shadow: 0 0 15px #00eaff;
      animation: glow 2s infinite alternate;
    }

    .subtitle{
      color:#ddd;
      margin-bottom:30px;
      font-size:1.2rem;
    }

    .names{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
      gap:20px;
    }

    .name-card{
      padding:18px;
      border-radius:15px;
      background: rgba(255,255,255,0.12);
      color:white;
      font-size:1.1rem;
      transition:0.4s;
      cursor:pointer;
      border:1px solid rgba(255,255,255,0.2);
    }

    .name-card:hover{
      transform: translateY(-8px) scale(1.05);
      background: linear-gradient(135deg,#00c6ff,#0072ff);
      box-shadow:0 0 20px rgba(0,198,255,0.7);
    }

    .circle{
      position:absolute;
      border-radius:50%;
      background: rgba(255,255,255,0.08);
      animation: move 10s linear infinite;
    }

    .circle:nth-child(1){
      width:120px;
      height:120px;
      top:10%;
      left:5%;
    }

    .circle:nth-child(2){
      width:180px;
      height:180px;
      bottom:10%;
      right:10%;
    }

    .circle:nth-child(3){
      width:80px;
      height:80px;
      top:70%;
      left:20%;
    }

    @keyframes glow{
      from{
        text-shadow:0 0 10px #00eaff;
      }
      to{
        text-shadow:0 0 25px #00eaff, 0 0 40px #0072ff;
      }
    }

    @keyframes floatBox{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-10px);
      }
    }

    @keyframes move{
      0%{
        transform:translateY(0) rotate(0deg);
      }
      100%{
        transform:translateY(-40px) rotate(360deg);
      }
    }

    .footer{
      margin-top:30px;
      color:#bbb;
      font-size:0.9rem;
    }
  </style>
</head>
<body>

  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <div class="container">
    <h1 id="title">Hello Batch 👋</h1>

    <p class="subtitle">
      Welcome to our amazing batch website ✨
    </p>

    <div class="names">
      <div class="name-card">Sakshi</div>
      <div class="name-card">Arjun</div>
      <div class="name-card">Priya</div>
      <div class="name-card">Rahul</div>
      <div class="name-card">Ananya</div>
      <div class="name-card">Vikram</div>
    </div>

    <div class="footer">
      Made with ❤️ using HTML, CSS & JavaScript
    </div>
  </div>

  <script>
    const title = document.getElementById("title");

    const colors = [
      "#00eaff",
      "#ff4ecd",
      "#ffe600",
      "#7dff7d",
      "#ff914d"
    ];

    let index = 0;

    setInterval(() => {
      title.style.color = colors[index];
      index = (index + 1) % colors.length;
    }, 1000);

    const cards = document.querySelectorAll(".name-card");

    cards.forEach(card => {
      card.addEventListener("click", () => {
        card.innerHTML = "✨ " + card.innerHTML + " ✨";
      });
    });
  </script>

</body>
</html>
